<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVISO IMPORTANTE | Morgan Beam</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --accent-pink: #f472b6; 
            --bg-dark: #070208; 
            --card-bg: #15051a; 
            --glow: rgba(244, 114, 182, 0.4); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            background-color: var(--bg-dark); 
            color: #fff; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #2d052a 0%, #070208 100%);
        }

        .notice-container {
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding: 40px;
            background: var(--card-bg);
            border: 2px solid var(--accent-pink);
            border-radius: 30px;
            box-shadow: 0 0 50px var(--glow);
            animation: pulseIn 0.8s ease-out;
        }

        .icon-warning {
            font-size: 4rem;
            color: var(--accent-pink);
            margin-bottom: 20px;
            text-shadow: 0 0 15px var(--accent-pink);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent-pink);
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #eee;
            margin-bottom: 30px;
        }

        .discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 40px;
            background: linear-gradient(45deg, #db2777, var(--accent-pink));
            color: white;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            border-radius: 50px; /* Arredondado */
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(219, 39, 119, 0.3);
        }

        .discord-btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 30px rgba(219, 39, 119, 0.5);
            filter: brightness(1.1);
        }

        .brand-footer {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #666;
            font-weight: 600;
        }

        @keyframes pulseIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Efeito de luz piscando no fundo */
        .glow-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.3;
            background: radial-gradient(circle at 50% 50%, var(--accent-pink) 0%, transparent 70%);
            animation: blink 4s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="glow-bg"></div>

    <div class="notice-container">
        <i class="fas fa-exclamation-triangle icon-warning"></i>
        <h1>ATENÇÃO</h1>
        <p>
            Aviso A Todos Da Crazzy O Serve Vai Ser Deletado e Nos Estamos Nesse Discord, 
            <br><strong>"Morgan Beam"</strong>
            <br><br>
            Nosso novo Discord oficial está abaixo:
        </p>
        
        <a href="https://discord.gg/R5DKKHqDtz" target="_blank" class="discord-btn">
            <i class="fab fa-discord"></i> ENTRAR NO NOVO DISCORD
        </a>

        <div class="brand-footer">
            Morgan Beam &copy; 2024
        </div>
    </div>

</body>
</html>
